<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>永豐順肉品｜進貨管理系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Microsoft JhengHei','PingFang TC',sans-serif;font-size:14px;background:#f4f4f0;color:#1a1a1a;}
/* ── 頂部 ── */
.topbar{background:#1a1a1a;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.topbar h1{font-size:15px;font-weight:500;white-space:nowrap;}
.sync{display:flex;align-items:center;gap:6px;font-size:12px;}
.dot{width:8px;height:8px;border-radius:50%;background:#888;flex-shrink:0;}
.dot.ok{background:#4caf50;}.dot.err{background:#f44336;}.dot.loading{background:#ff9800;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
/* ── API bar ── */
.apibar{background:#fff;border-bottom:1px solid #ddd;padding:8px 20px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.apibar input{flex:1;min-width:200px;font-size:12px;padding:5px 10px;border:1px solid #ccc;border-radius:5px;}
.apibar button{padding:5px 14px;font-size:12px;border:none;border-radius:5px;cursor:pointer;font-weight:500;}
.btn-dark{background:#1a1a1a;color:#fff;}.btn-outline{background:#fff;border:1px solid #ccc;color:#333;}
/* ── 容器 ── */
.wrap{max-width:1100px;margin:0 auto;padding:14px;}
/* ── Tabs ── */
.tabs{display:flex;border-bottom:2px solid #ddd;margin-bottom:14px;overflow-x:auto;gap:0;}
.tab{padding:8px 16px;font-size:13px;font-weight:500;color:#666;background:none;border:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;}
.tab.on{color:#1a1a1a;border-bottom:3px solid #1a1a1a;}
.sec{display:none;}.sec.on{display:block;}
/* ── 卡片 ── */
.card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:14px 18px;margin-bottom:12px;}
/* ── 表單 ── */
.fl{font-size:11px;color:#666;display:block;margin-bottom:3px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
input,select{font-size:13px;width:100%;padding:6px 10px;border:1px solid #ccc;border-radius:6px;outline:none;}
input:focus,select:focus{border-color:#1a1a1a;}
input[readonly]{background:#f5f5f5;color:#666;}
/* ── 按鈕 ── */
.btn{padding:7px 16px;font-size:13px;font-weight:500;cursor:pointer;border-radius:7px;border:none;white-space:nowrap;}
.btn-p{background:#1a1a1a;color:#fff;}.btn-p:hover{background:#333;}
.btn-b{background:#185FA5;color:#fff;}.btn-b:hover{background:#0d4a8a;}
.btn-g{background:#2d7d46;color:#fff;}.btn-g:hover{background:#1e5c33;}
.btn-o{background:#fff;border:1px solid #ccc;color:#333;}.btn-o:hover{background:#f5f5f5;}
.btn-s{padding:3px 9px;font-size:12px;cursor:pointer;border-radius:5px;background:#fff;border:1px solid #ccc;color:#555;}
.btn-del{color:#c0392b;border-color:#e0b0b0;}
/* ── 摘要卡 ── */
.mcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:14px;}
.mcard{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:10px 14px;}
.mcard-lbl{font-size:11px;color:#888;margin-bottom:3px;}
.mcard-val{font-size:19px;font-weight:600;}
.blue{color:#185FA5;}.red{color:#c0392b;}.green{color:#2d7d46;}
/* ── 搜尋框 / dropdown ── */
.sb{position:relative;}
.dd{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ccc;border-radius:7px;max-height:180px;overflow-y:auto;z-index:500;display:none;box-shadow:0 4px 12px rgba(0,0,0,.1);}
.dd.open{display:block;}
.di{padding:7px 12px;font-size:13px;cursor:pointer;}
.di:hover,.di.focused{background:#e8f0fe;}
.di .sub{font-size:11px;color:#aaa;float:right;}
/* ── Tags ── */
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.tag{display:flex;align-items:center;gap:4px;background:#f0f0f0;border:1px solid #ddd;border-radius:99px;padding:2px 9px;font-size:12px;}
.tag button{background:none;border:none;cursor:pointer;font-size:13px;color:#888;padding:0;line-height:1;}
/* ── 表格 ── */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:600px;}
th{text-align:left;padding:6px 8px;font-size:11px;color:#888;border-bottom:1px solid #eee;background:#fafaf8;white-space:nowrap;}
td{padding:6px 8px;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafaf8;}
/* ── Badge ── */
.badge{display:inline-block;padding:1px 8px;border-radius:99px;font-size:11px;font-weight:500;margin:1px;}
.bb{background:#E6F1FB;color:#185FA5;}.bg2{background:#EAF3DE;color:#3B6D11;}
.bt{background:#E1F5EE;color:#0F6E56;}.ba{background:#FAEEDA;color:#854F0B;}
.br{background:#FCEBEB;color:#A32D2D;}.bp{background:#EEEDFE;color:#534AB7;}
/* ── 其他 ── */
.empty{text-align:center;padding:2rem;color:#aaa;font-size:13px;}
.msg-ok{color:#2d7d46;font-size:13px;}.msg-err{color:#c0392b;font-size:13px;}
.sarea{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center;}
.summary-bar{font-size:12px;color:#555;padding:5px 0;margin-bottom:6px;}
.summary-bar strong{color:#185FA5;}
.bank-box{background:#EAF3DE;border:1px solid #b8d4b8;border-radius:7px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:#2d7d46;display:none;}
.load-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.7);z-index:999;align-items:center;justify-content:center;font-size:14px;color:#555;}
.load-overlay.show{display:flex;}
.spinner{width:24px;height:24px;border:3px solid #ddd;border-top-color:#1a1a1a;border-radius:50%;animation:spin .7s linear infinite;margin-right:10px;}
@keyframes spin{to{transform:rotate(360deg)}}
.edit-row td{background:#f0f6ff!important;}
.edit-row-e td{background:#f0fff4!important;}
@media(max-width:600px){.g4{grid-template-columns:1fr 1fr;}.g3{grid-template-columns:1fr 1fr;}.mcards{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<!-- 登入遮罩 -->
<div id="login-overlay" style="position:fixed;inset:0;background:#1a1a1a;z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:14px;padding:40px 36px;width:320px;box-shadow:0 8px 32px rgba(0,0,0,.3);">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:28px;margin-bottom:8px;">🥩</div>
      <div style="font-size:18px;font-weight:600;color:#1a1a1a;">永豐順肉品</div>
      <div style="font-size:12px;color:#888;margin-top:4px;">進貨管理系統</div>
    </div>
    <div style="margin-bottom:12px;">
      <label style="font-size:12px;color:#666;display:block;margin-bottom:4px;">帳號</label>
      <input id="login-user" type="text" placeholder="請輸入帳號" style="width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:7px;font-size:14px;outline:none;" onkeydown="if(event.key==='Enter')document.getElementById('login-pass').focus()"/>
    </div>
    <div style="margin-bottom:20px;">
      <label style="font-size:12px;color:#666;display:block;margin-bottom:4px;">密碼</label>
      <input id="login-pass" type="password" placeholder="請輸入密碼" style="width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:7px;font-size:14px;outline:none;" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button onclick="doLogin()" style="width:100%;padding:10px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">登入</button>
    <div id="login-err" style="color:#c0392b;font-size:12px;text-align:center;margin-top:10px;height:16px;"></div>
  </div>
</div>

<div class="topbar">
  <h1>🥩 永豐順肉品｜進貨管理系統</h1>
  <div class="sync"><div class="dot" id="dot"></div><span id="sync-txt">未設定資料庫</span></div>
</div>
<div class="apibar">
  <span style="font-size:12px;color:#888;white-space:nowrap;">資料庫網址：</span>
  <input type="text" id="api-url" placeholder="貼上 Google Apps Script 網址（https://script.google.com/macros/s/...）"/>
  <button class="btn-dark btn" onclick="saveApi()">儲存連線</button>
  <button class="btn-outline btn" onclick="testApi()">測試連線</button>
</div>

<div class="load-overlay" id="loader"><div class="spinner"></div><span id="loader-txt">讀取中...</span></div>

<div class="wrap">
<div class="tabs">
  <button class="tab on"  onclick="sw(0)">進貨單</button>
  <button class="tab"     onclick="sw(1)">進貨記錄</button>
  <button class="tab"     onclick="sw(2)">開銷記錄</button>
  <button class="tab"     onclick="sw(3)">📊 報表</button>
  <button class="tab"     onclick="sw(4)">🏭 廠商管理</button>
  <button class="tab"     onclick="sw(5)">商品表</button>
  <button class="tab"     onclick="sw(6)">平均成本</button>
</div>

<!-- ══ 0: 進貨單 ══ -->
<div class="sec on" id="s0">
  <div class="card">
    <div class="g4">
      <div><label class="fl">進貨日期</label><input type="date" id="i-date"/></div>
      <div><label class="fl">供應商</label>
        <div class="sb"><input id="i-sup" placeholder="搜尋供應商..." oninput="ddSearch('i-sup','dd-sup','purchase')" onfocus="ddSearch('i-sup','dd-sup','purchase')" onkeydown="ddKeyNav(event,'dd-sup','selSup')" autocomplete="off"/>
        <div class="dd" id="dd-sup"></div></div></div>
      <div><label class="fl">品名</label>
        <div class="sb"><input id="i-name" placeholder="搜尋品名..." oninput="ddName(this.value)" onfocus="ddName(this.value)" onkeydown="ddKeyNav(event,'dd-name','selName')" autocomplete="off"/>
        <div class="dd" id="dd-name"></div></div></div>
      <div><label class="fl">單價（元/公斤）</label><input type="number" id="i-price" placeholder="0" min="0" step="0.01" oninput="calcAmt();checkPriceChange()" style="transition:border .2s;"/></div>
    </div>
    <div class="g4">
      <div><label class="fl">數量（公斤）</label><input type="number" id="i-qty" placeholder="0" min="0" step="0.01" oninput="calcAmt()"/></div>
    </div>
    <div class="g3">
      <div><label class="fl">金額（自動）</label><input type="number" id="i-amt" readonly/></div>
    <div id="price-hint" style="grid-column:span 2;margin-top:-6px;"></div>
      <div><label class="fl">備註</label><input id="i-note" placeholder="選填"/></div>
      <div></div>
    </div>
    <div style="margin-bottom:10px;">
      <label class="fl">連結商品（可多選）</label>
      <div class="sb"><input id="i-link" placeholder="搜尋商品表..." oninput="ddLink(this.value)" onfocus="ddLink(this.value)" autocomplete="off"/>
      <div class="dd" id="dd-link"></div></div>
      <div class="tags" id="link-tags"></div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <button class="btn btn-p" onclick="addPurchase()">新增進貨</button>
      <span id="p-msg"></span>
    </div>
  </div>
  <div class="mcards">
    <div class="mcard"><div class="mcard-lbl">本月進貨筆數</div><div class="mcard-val" id="m0">-</div></div>
    <div class="mcard"><div class="mcard-lbl">本月進貨總額</div><div class="mcard-val blue" id="m1">-</div></div>
    <div class="mcard"><div class="mcard-lbl">品項種類</div><div class="mcard-val" id="m2">-</div></div>
    <div class="mcard"><div class="mcard-lbl">本月開銷</div><div class="mcard-val red" id="m3">-</div></div>
    <div class="mcard"><div class="mcard-lbl">本月總支出</div><div class="mcard-val" id="m4">-</div></div>
  </div>
</div>

<!-- ══ 1: 進貨記錄 ══ -->
<div class="sec" id="s1">
  <div class="sarea" style="flex-wrap:wrap;">
    <input type="date" id="h-s" style="width:138px;"/>
    <span style="color:#888;">－</span>
    <input type="date" id="h-e" style="width:138px;"/>
    <div class="sb" style="width:150px;">
      <input id="h-sup" placeholder="所有廠商" oninput="ddHSup(this.value)" onfocus="ddHSup(this.value)" autocomplete="off" style="width:100%;"/>
      <div class="dd" id="dd-h-sup"></div>
    </div>
    <input id="h-kw" placeholder="搜尋品名" style="width:130px;" oninput="renderHistory()"/>
    <button class="btn btn-o" onclick="renderHistory()">儲存</button>
    <button class="btn btn-b" onclick="loadAndRender()">雲端重載</button>
    <button class="btn btn-o" onclick="clearHFilter()">清除</button>
  </div>
  <div class="sarea" style="flex-wrap:wrap;margin-top:0;">
    <span style="font-size:12px;color:#888;white-space:nowrap;">排序：</span>
    <select id="h-sort" style="width:160px;font-size:13px;" onchange="renderHistory()">
      <option value="date-desc">日期（新→舊）</option>
      <option value="date-asc">日期（舊→新）</option>
      <option value="price-desc">單價（高→低）</option>
      <option value="price-asc">單價（低→高）</option>
      <option value="qty-desc">重量（多→少）</option>
      <option value="qty-asc">重量（少→多）</option>
      <option value="amount-desc">金額（高→低）</option>
      <option value="amount-asc">金額（低→高）</option>
    </select>
    <span style="font-size:12px;color:#888;white-space:nowrap;">分類：</span>
    <select id="h-linked" style="width:150px;font-size:13px;" onchange="renderHistory()">
      <option value="">全部</option>
      <option value="linked">有連結商品</option>
      <option value="unlinked">未連結商品</option>
    </select>
    <span style="font-size:12px;color:#888;white-space:nowrap;">連結商品：</span>
    <div class="sb" style="width:160px;">
      <input id="h-prod" placeholder="篩選連結商品..." oninput="ddHProd(this.value)" onfocus="ddHProd(this.value)" autocomplete="off" style="width:100%;font-size:13px;"/>
      <div class="dd" id="dd-h-prod"></div>
    </div>
  </div>
  <div class="summary-bar" id="h-bar"></div>
  <div class="tbl-wrap" id="h-tbl"></div>
</div>

<!-- ══ 2: 開銷記錄 ══ -->
<div class="sec" id="s2">
  <div class="card">
    <div class="g4">
      <div><label class="fl">廠商</label>
        <div class="sb"><input id="e-sup" placeholder="搜尋廠商..." oninput="ddSearch('e-sup','dd-e-sup','expense')" onfocus="ddSearch('e-sup','dd-e-sup','expense')" autocomplete="off"/>
        <div class="dd" id="dd-e-sup"></div></div></div>
      <div><label class="fl">類別</label>
        <select id="e-cat" onchange="showCustom()">
          <option>進貨耗材</option><option>包材</option><option>水電</option>
          <option>人事</option><option>運費</option><option>設備</option>
          <option>雜費</option><option value="other">自訂...</option>
        </select></div>
      <div id="e-cw" style="display:none;"><label class="fl">自訂類別</label><input id="e-custom" placeholder="類別名稱"/></div>
      <div><label class="fl">金額（元）</label><input type="number" id="e-amt" placeholder="0" min="0"/></div>
    </div>
    <div class="g4">
      <div><label class="fl">日期</label><input type="date" id="e-date"/></div>
      <div><label class="fl">付款方式</label>
        <select id="e-pay" onchange="showBank()">
          <option value="cash">現金</option><option value="transfer">匯款</option>
        </select></div>
      <div><label class="fl">說明</label><input id="e-desc" placeholder="例：A4紙箱100個"/></div>
      <div><label class="fl">備註</label><input id="e-note2" placeholder="選填"/></div>
    </div>
    <div class="bank-box" id="bank-box">💳 <span id="bank-info">請先選擇廠商</span></div>
    <div style="display:flex;gap:10px;align-items:center;">
      <button class="btn btn-p" onclick="addExpense()">新增開銷</button>
      <span id="e-msg"></span>
    </div>
  </div>
  <div class="sarea">
    <input type="date" id="e-s" style="width:138px;"/>
    <span style="color:#888;">－</span>
    <input type="date" id="e-e" style="width:138px;"/>
    <input id="e-kw" placeholder="搜尋說明/類別" style="width:160px;" oninput="renderExpense()"/>
    <button class="btn btn-b" onclick="loadExpenses()">雲端重載</button>
  </div>
  <div id="e-sum" style="margin-bottom:8px;"></div>
  <div class="tbl-wrap" id="e-tbl"></div>
</div>

<!-- ══ 3: 報表 ══ -->
<div class="sec" id="s3">
  <div class="card">
    <div class="sarea" style="margin:0;">
      <input type="date" id="r-s" style="width:138px;"/>
      <span style="color:#888;">－</span>
      <input type="date" id="r-e" style="width:138px;"/>
      <div class="sb" style="width:150px;">
        <input id="r-sup" placeholder="全部廠商" oninput="ddRSup(this.value)" onfocus="ddRSup(this.value)" autocomplete="off" style="width:100%;"/>
        <div class="dd" id="dd-r-sup"></div>
      </div>
      <button class="btn btn-p" onclick="genReport()">產生報表</button>
      <button class="btn btn-o" onclick="setThisMonth()">本月</button>
      <button class="btn btn-g" onclick="exportCSV()">⬇ 匯出 CSV</button>
      <button class="btn btn-o" onclick="exportDetail()">⬇ 明細 CSV</button>
    </div>
  </div>
  <div id="r-content"><div class="empty">請選擇日期範圍後按「產生報表」</div></div>
</div>

<!-- ══ 4: 廠商管理 ══ -->
<div class="sec" id="s4">
  <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
    <button class="btn btn-b" onclick="openSupForm('purchase')">＋ 新增進貨廠商</button>
    <button class="btn btn-g" onclick="openSupForm('expense')">＋ 新增開銷廠商</button>
  </div>
  <div class="card" id="sup-form" style="display:none;margin-bottom:12px;">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px;" id="sup-form-title">新增廠商</div>
    <input type="hidden" id="sup-type"/>
    <input type="hidden" id="sup-edit-id"/>
    <div class="g4">
      <div><label class="fl">廠商名稱*</label><input id="sf-name" placeholder="廠商名稱"/></div>
      <div><label class="fl">聯絡人</label><input id="sf-contact" placeholder="聯絡人"/></div>
      <div><label class="fl">電話</label><input id="sf-phone" placeholder="電話"/></div>
      <div><label class="fl">分類標籤</label><input id="sf-tag" placeholder="例：雞肉、豬肉"/></div>
    </div>
    <div class="g4">
      <div><label class="fl">銀行名稱</label><input id="sf-bank" placeholder="例：台灣銀行-屏東分行"/></div>
      <div><label class="fl">帳號</label><input id="sf-acct" placeholder="帳號"/></div>
      <div><label class="fl">戶名</label><input id="sf-acname" placeholder="戶名"/></div>
      <div><label class="fl">備註</label><input id="sf-note" placeholder="選填"/></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="btn btn-p" onclick="saveSup()">儲存</button>
      <button class="btn btn-o" onclick="closeSupForm()">取消</button>
      <span id="sf-msg"></span>
    </div>
  </div>
  <div style="font-size:13px;font-weight:600;color:#185FA5;margin-bottom:8px;">📦 進貨廠商</div>
  <div class="tbl-wrap" id="sup-p-tbl"></div>
  <div style="font-size:13px;font-weight:600;color:#2d7d46;margin:14px 0 8px;">💸 開銷廠商</div>
  <div class="tbl-wrap" id="sup-e-tbl"></div>
</div>

<!-- ══ 5: 商品表 ══ -->
<div class="sec" id="s5">
  <div class="card" style="margin-bottom:12px;">
    <div style="font-size:13px;font-weight:600;margin-bottom:8px;">新增商品</div>
    <div class="g4">
      <div><label class="fl">商品名稱*</label><input id="np-name" placeholder="商品名稱"/></div>
      <div><label class="fl">大類</label><select id="np-cat"><option>豬肉類</option><option>雞肉類</option><option>其他</option></select></div>
      <div><label class="fl">小類</label><input id="np-sub" placeholder="例：豬肉分切"/></div>

function normDate(d){

}

async function apiFetch(action,params={}){
  const url=new URL(API);

  for(const[k,v]of Object.entries(params))

  const r=await fetch(url.toString());
  const j=await r.json();
  if(!j.ok)throw new Error(j.error||'API error');
  return j.data;
}

// 鍵盤導覽 dropdown
function ddKeyNav(e,ddId,onSelect){
  const dd=document.getElementById(ddId);
  if(!dd||!dd.classList.contains('open'))return;
  const items=dd.querySelectorAll('.di');
  if(!items.length)return;
  let cur=[...items].findIndex(el=>el.classList.contains('focused'));
  if(e.key==='ArrowDown'){
    e.preventDefault();
    if(cur>=0)items[cur].classList.remove('focused');
    cur=Math.min(cur+1,items.length-1);
    items[cur].classList.add('focused');
    items[cur].scrollIntoView({block:'nearest'});
  }else if(e.key==='ArrowUp'){
    e.preventDefault();
    if(cur>=0)items[cur].classList.remove('focused');
    cur=Math.max(cur-1,0);
    items[cur].classList.add('focused');
    items[cur].scrollIntoView({block:'nearest'});
  }else if(e.key==='Enter'&&cur>=0){
    e.preventDefault();
    items[cur].dispatchEvent(new MouseEvent('mousedown',{bubbles:true}));
  }else if(e.key==='Escape'){
    dd.classList.remove('open');
  }
}

// 取得某品名的歷史平均單價（加權平均，排除當筆）
function getAvgPrice(name, excludeId=null){
  const rows=purchases.filter(p=>p.name===name&&p.price&&(!excludeId||String(p.id)!==String(excludeId)));
  if(!rows.length)return null;
  const totalAmt=rows.reduce((s,r)=>s+r.amount,0);
  const totalQty=rows.reduce((s,r)=>s+r.qty,0);
  return totalQty>0?totalAmt/totalQty:null;
}
// 判斷單價異動幅度（超過2%算異動）
function priceStatus(price,avgPrice){
  if(!avgPrice||!price)return null;
  const diff=price-avgPrice;
  const pct=diff/avgPrice*100;
  if(Math.abs(pct)<2)return null;
  return{diff,pct,up:diff>0};
}

function checkPriceChange(){
  const el=document.getElementById('i-price');
  const cur=parseFloat(el.value)||0;
  const hist=parseFloat(el.dataset.histPrice||0);
  if(!hist||!cur)return;
  const diff=cur-hist;
  const pct=Math.abs(diff/hist*100).toFixed(1);
  if(Math.abs(diff)<0.01){
    el.style.borderColor='';el.style.fontWeight='';
    document.getElementById('price-hint').textContent='';
    return;
  }
  const up=diff>0;
  el.style.borderColor=up?'#c0392b':'#2d7d46';

function autoFillLinked(name){

  const prev=[...purchases].reverse().find(p=>p.name===name&&p.linked&&p.linked.length);
  if(!prev)return;
  // 只補上沒有的，不覆蓋已選的
  prev.linked.forEach(l=>{

  renderTags();

  msgShow('p-msg',`已自動帶入上次連結：${prev.linked.join('、')}`);

  },3000);
}

async function addPurchase(){
  const name=document.getElementById('i-name').value.trim();
  const sup=document.getElementById('i-sup').value.trim();
  const price=parseFloat(document.getElementById('i-price').value)||0;
  const qty=parseFloat(document.getElementById('i-qty').value)||0;
  const amt=parseFloat(document.getElementById('i-amt').value)||price*qty;
  const note=document.getElementById('i-note').value.trim();
  if(!name||!price||!qty){msgShow('p-msg','請填寫品名、單價、數量',false);return;}
  const inputDate=document.getElementById('i-date').value||today;
  const row={id:Date.now(),date:inputDate,name,supplier:sup,price,qty,amount:amt,note,linked:[...linked]};
  // 先存本地
  purchases.push(row);
  saveNameHist(name);
  saveLocal();
  updateMetrics();
  // 清空表單
  ['i-name','i-price','i-qty','i-amt','i-note','i-sup'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('i-date').value=today;
  const ph=document.getElementById('price-hint');if(ph)ph.textContent='';
  const pe=document.getElementById('i-price');if(pe){pe.style.borderColor='';pe.style.fontWeight='';pe.dataset.histPrice='';}
  linked=[];renderTags();
  msgShow('p-msg',`已新增：${name} ×${qty}公斤，${fmt(amt)}`);
  // 送到雲端
  if(API){
    try{
      await apiFetch('addPurchase',{data:row});
    }catch(e){
      msgShow('p-msg',`已存本地，雲端同步失敗：${e.message}`,false);
    }
  }
}

function updateMetrics(){
  const mp=purchases.filter(p=>p.date&&p.date.startsWith(thisMonth));
  const me=expenses.filter(e=>e.date&&e.date.startsWith(thisMonth));
  const pt=mp.reduce((s,r)=>s+r.amount,0);

function renderHistory(){
  const start=document.getElementById('h-s').value;
  const end=document.getElementById('h-e').value;
  const sup=document.getElementById('h-sup').value.trim();
  const kw=document.getElementById('h-kw').value.toLowerCase();
  const sort=document.getElementById('h-sort').value;
  const linked=document.getElementById('h-linked').value;
  const prod=document.getElementById('h-prod').value.trim();

  let f=purchases.filter(p=>{
    if(!p.date)return false;
    if(start&&p.date<start)return false;
    if(end&&p.date>end)return false;
    if(sup&&(p.supplier||'')!==sup)return false;
    if(kw&&!(p.name||'').toLowerCase().includes(kw))return false;
    if(linked==='linked'&&!(p.linked&&p.linked.length))return false;
    if(linked==='unlinked'&&p.linked&&p.linked.length)return false;
    if(prod&&!(p.linked||[]).includes(prod))return false;
    return true;
  });

  // 排序
  const [sortKey,sortDir]=sort.split('-');
  f.sort((a,b)=>{
    let va=a[sortKey]||0, vb=b[sortKey]||0;
    if(sortKey==='date'){va=a.date||'';vb=b.date||'';}
    if(sortDir==='desc') return va>vb?-1:va<vb?1:0;
    return va>vb?1:va<vb?-1:0;
  });

  const bar=document.getElementById('h-bar');
  if(f.length){
    const tot=f.reduce((s,r)=>s+r.amount,0);
    const kg=f.reduce((s,r)=>s+r.qty,0);
    bar.innerHTML=`共 <strong>${f.length}</strong> 筆 ／ <strong>${kg.toFixed(2)} 公斤</strong> ／ 合計 <strong>${fmt(tot)}</strong>`;
  }else bar.textContent='';

  const el=document.getElementById('h-tbl');
  if(!f.length){el.innerHTML='<div class="empty">無符合進貨記錄</div>';return;}
  el.innerHTML=`<table><thead><tr>
    <th>日期</th><th>品名</th><th>供應商</th><th>單價(元/kg)</th><th>數量(kg)</th><th>金額</th><th>連結商品</th><th>備註</th><th>操作</th>
  </tr></thead><tbody>${f.map(r=>{
    const id=r.id;
    if(String(editPurchaseId)===String(id)){
      return `<tr class="edit-row">
        <td><input type="date" id="ep-d-${id}" value="${r.date}" style="width:128px;font-size:12px;"/></td>
        <td><input id="ep-n-${id}" value="${esc(r.name)}" style="width:110px;font-size:12px;"/></td>
        <td><input id="ep-s-${id}" value="${esc(r.supplier||'')}" style="width:80px;font-size:12px;"/></td>
        <td><input type="number" id="ep-p-${id}" value="${r.price}" style="width:70px;font-size:12px;"/></td>
        <td><input type="number" id="ep-q-${id}" value="${r.qty}" style="width:65px;font-size:12px;"/></td>
        <td style="color:#888;font-size:12px;">自動</td>
        <td style="min-width:160px;">
          <div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px;" id="ep-lk-tags-${id}">
            ${(r.linked||[]).map(l=>`<span style="display:inline-flex;align-items:center;gap:2px;background:#E1F5EE;color:#0F6E56;border-radius:99px;padding:1px 7px;font-size:11px;">
              ${l}<button style="background:none;border:none;cursor:pointer;color:#0F6E56;font-size:12px;line-height:1;padding:0;" onmousedown="event.preventDefault();epRmLink('${id}','${esc(l)}')">×</button>
            </span>`).join('')}
          </div>
          <div style="position:relative;">
            <input id="ep-lk-inp-${id}" placeholder="新增連結..." style="width:130px;font-size:11px;padding:3px 6px;" 
              oninput="epLkSearch('${id}',this.value)" onfocus="epLkSearch('${id}',this.value)" autocomplete="off"/>
            <div class="dd" id="ep-lk-dd-${id}"></div>
          </div>
        </td>
        <td><input id="ep-no-${id}" value="${esc(r.note||'')}" style="width:80px;font-size:12px;"/></td>
        <td style="white-space:nowrap;">
          <button class="btn-s" style="background:#185FA5;color:#fff;border:none;margin-right:3px;" onclick="saveEditP('${id}')">儲存</button>
          <button class="btn-s" onclick="cancelEditP()">取消</button>
        </td></tr>`;
    }
    const lk=r.linked&&r.linked.length
      ?r.linked.map(l=>`<span class="badge bt" style="margin:1px;">${l}</span>`).join('')
      :'<span style="color:#ccc;font-size:11px;">-</span>';
    const avg=getAvgPrice(r.name,r.id);
    const ps=priceStatus(r.price,avg);
    const priceStyle=ps?(ps.up?'color:#c0392b;font-weight:700;':'color:#2d7d46;font-weight:700;'):'';
    const priceHint=ps?` <span style="font-size:10px;${priceStyle}">${ps.up?'▲':'▼'}${Math.abs(ps.pct).toFixed(1)}%</span>`:'';
    return `<tr>
      <td>${r.date}</td>
      <td style="font-weight:600;">${r.name}</td>
      <td>${r.supplier||'-'}</td>
      <td style="${priceStyle}">${fmtD(r.price)}${priceHint}</td>
      <td>${(r.qty||0).toFixed(2)}</td>
      <td style="font-weight:600;">${fmt(r.amount)}</td>
      <td style="max-width:160px;">${lk}</td>
      <td style="font-size:11px;color:#888;">${r.note||''}</td>
      <td style="white-space:nowrap;">
        <button class="btn-s" onclick="startEditP('${id}')" style="margin-right:3px;">編輯</button>
        <button class="btn-s btn-del" onclick="delPurchase('${id}')">刪除</button>
      </td></tr>`;
  }).join('')}</tbody></table>`;
}

// 進貨記錄 inline 連結商品編輯
function epLkSearch(id,q){
  const dd=document.getElementById(`ep-lk-dd-${id}`);
  if(!dd)return;
  const r=purchases.find(p=>String(p.id)===String(id));
  const used=new Set(r?r.linked||[]:[]);
  const hist=getNameHistory();
  // 搜尋商品表 + 歷史連結
  const pool=[...new Set([...PRODS.map(p=>p.n),...hist])];
  const res=q?pool.filter(n=>n.toLowerCase().includes(q.toLowerCase())&&!used.has(n)):pool.filter(n=>!used.has(n));
  if(!res.length){dd.classList.remove('open');return;}
  dd.innerHTML=res.slice(0,12).map(n=>`<div class="di" style="font-size:12px;" onmousedown="event.preventDefault();epLkAdd('${id}','${esc(n)}')">${n}</div>`).join('');
  dd.classList.add('open');
}
function epLkAdd(id,name){
  const r=purchases.find(p=>String(p.id)===String(id));
  if(!r)return;
  if(!r.linked)r.linked=[];
  if(!r.linked.includes(name))r.linked.push(name);
  const inp=document.getElementById(`ep-lk-inp-${id}`);
  if(inp)inp.value='';
  const dd=document.getElementById(`ep-lk-dd-${id}`);
  if(dd)dd.classList.remove('open');
  // 重新渲染 tags
  const tagsEl=document.getElementById(`ep-lk-tags-${id}`);
  if(tagsEl){
    tagsEl.innerHTML=r.linked.map(l=>`<span style="display:inline-flex;align-items:center;gap:2px;background:#E1F5EE;color:#0F6E56;border-radius:99px;padding:1px 7px;font-size:11px;">
      ${l}<button style="background:none;border:none;cursor:pointer;color:#0F6E56;font-size:12px;line-height:1;padding:0;" onmousedown="event.preventDefault();epRmLink('${id}','${esc(l)}')">×</button>
    </span>`).join('');
  }
}
function epRmLink(id,name){
  const r=purchases.find(p=>String(p.id)===String(id));
  if(!r)return;
  r.linked=(r.linked||[]).filter(l=>l!==name);
  const tagsEl=document.getElementById(`ep-lk-tags-${id}`);
  if(tagsEl){
    tagsEl.innerHTML=r.linked.map(l=>`<span style="display:inline-flex;align-items:center;gap:2px;background:#E1F5EE;color:#0F6E56;border-radius:99px;padding:1px 7px;font-size:11px;">
      ${l}<button style="background:none;border:none;cursor:pointer;color:#0F6E56;font-size:12px;line-height:1;padding:0;" onmousedown="event.preventDefault();epRmLink('${id}','${esc(l)}')">×</button>
    </span>`).join('');
  }
}

        <td><input id="ee-s-${id}" value="${esc(e.supplier||'')}" style="width:80px;font-size:12px;"/></td>

          ${['進貨耗材','包材','水電','人事','運費','設備','雜費'].map(cat=>`<option${e.cat===cat?' selected':''}>${cat}</option>`).join('')}
        </select></td>
        <td><input id="ee-desc-${id}" value="${esc(e.desc||'')}" style="width:120px;font-size:12px;"/></td>
        <td><select id="ee-pay-${id}" style="width:70px;font-size:12px;">
          <option value="cash"${e.payment==='cash'?' selected':''}>現金</option>
          <option value="transfer"${e.payment==='transfer'?' selected':''}>匯款</option>
        </select></td>
        <td><input type="number" id="ee-amt-${id}" value="${e.amt}" style="width:80px;font-size:12px;"/></td>
        <td><input id="ee-no-${id}" value="${esc(e.note||'')}" style="width:80px;font-size:12px;"/></td>
        <td style="white-space:nowrap;">
          <button class="btn-s" style="background:#2d7d46;color:#fff;border:none;margin-right:3px;" onclick="saveEditE('${id}')">儲存</button>
          <button class="btn-s" onclick="cancelEditE()">取消</button>
        </td></tr>`;
    }
    return `<tr>
      <td>${e.date}</td>
      <td>${e.supplier||'-'}</td>
      <td><span class="badge ${ECAT_CLS[e.cat]||'ba'}">${e.cat}</span></td>
      <td style="font-weight:600;">${e.desc}</td>
      <td><span class="badge ${e.payment==='transfer'?'bb':'bg2'}">${e.payment==='transfer'?'匯款':'現金'}</span></td>
      <td style="font-weight:600;">${fmt(e.amt)}</td>
      <td style="font-size:11px;color:#888;">${e.note||''}</td>
      <td style="white-space:nowrap;">
        <button class="btn-s" onclick="startEditE('${id}')" style="margin-right:3px;">編輯</button>
        <button class="btn-s btn-del" onclick="delExpense('${id}')">刪除</button>
      </td></tr>`;
  }).join('')}</tbody></table>`;
}

function setThisMonth(){
  const y=new Date().getFullYear(),m=String(new Date().getMonth()+1).padStart(2,'0');
  document.getElementById('r-s').value=`${y}-${m}-01`;
  document.getElementById('r-e').value=new Date(y,new Date().getMonth()+1,0).toISOString().slice(0,10);
}

function getReportData(){
  const s=document.getElementById('r-s').value;
  const e=document.getElementById('r-e').value;
  const sup=document.getElementById('r-sup').value.trim();
  let mp=purchases.filter(p=>p.date&&(!s||p.date>=s)&&(!e||p.date<=e)&&(!sup||p.supplier===sup));
  let me=expenses.filter(x=>x.date&&(!s||x.date>=s)&&(!e||x.date<=e)&&(!sup||x.supplier===sup));
  return{mp,me,s,e,sup};
}

function genReport(){
  const{mp,me,s,e,sup}=getReportData();

  if(!s||!e){document.getElementById('r-content').innerHTML='<div class="empty">請選擇開始與結束日期</div>';return;}
  const totalP=mp.reduce((t,r)=>t+r.amount,0);
  const totalE=me.reduce((t,r)=>t+r.amt,0);
  const totalKg=mp.reduce((t,r)=>t+r.qty,0);
  // 供應商彙總
  const bySup={};
  mp.forEach(r=>{const k=r.supplier||'(未填)';if(!bySup[k])bySup[k]={tot:0,kg:0,cnt:0};bySup[k].tot+=r.amount;bySup[k].kg+=r.qty;bySup[k].cnt++;});
  const supList=Object.entries(bySup).sort((a,b)=>b[1].tot-a[1].tot);
  const maxS=supList.length?supList[0][1].tot:1;
  // 品項彙總
  const byItem={};
  mp.forEach(r=>{if(!byItem[r.name])byItem[r.name]={tot:0,kg:0,cnt:0};byItem[r.name].tot+=r.amount;byItem[r.name].kg+=r.qty;byItem[r.name].cnt++;});
  const itemList=Object.entries(byItem).sort((a,b)=>b[1].tot-a[1].tot).slice(0,15);
  const maxI=itemList.length?itemList[0][1].tot:1;
  // 開銷類別
  const byExp={};
  me.forEach(e=>{byExp[e.cat]=(byExp[e.cat]||0)+e.amt;});
  const expList=Object.entries(byExp).sort((a,b)=>b[1]-a[1]);
  const maxE=expList.length?expList[0][1]:1;

  document.getElementById('r-content').innerHTML=`
  <div style="font-size:15px;font-weight:600;margin-bottom:12px;">${s} ～ ${e}${sup?' ／ '+sup:''} 報表</div>
  <div class="mcards" style="margin-bottom:16px;">
    <div class="mcard" style="border-left:3px solid #185FA5;"><div class="mcard-lbl">進貨總額</div><div class="mcard-val blue">${fmt(totalP)}</div><div style="font-size:11px;color:#aaa;">${mp.length} 筆 / ${totalKg.toFixed(1)} 公斤</div></div>
    <div class="mcard" style="border-left:3px solid #c0392b;"><div class="mcard-lbl">開銷總額</div><div class="mcard-val red">${fmt(totalE)}</div><div style="font-size:11px;color:#aaa;">${me.length} 筆</div></div>
    <div class="mcard" style="border-left:3px solid #854F0B;"><div class="mcard-lbl">本期總支出</div><div class="mcard-val" style="color:#854F0B;">${fmt(totalP+totalE)}</div></div>
    <div class="mcard" style="border-left:3px solid #2d7d46;"><div class="mcard-lbl">進貨品項</div><div class="mcard-val green">${Object.keys(byItem).length} 種</div></div>
  </div>
  <div class="card" style="margin-bottom:12px;">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px;">🏭 供應商進貨金額</div>
    ${supList.length?`<table><thead><tr><th>供應商</th><th>筆數</th><th>數量(kg)</th><th style="width:180px;">佔比</th><th>金額</th></tr></thead>
    <tbody>${supList.map(([k,d])=>`<tr>
      <td style="font-weight:600;">${k}</td><td>${d.cnt}</td><td>${d.kg.toFixed(1)}</td>
      <td><div style="display:flex;align-items:center;gap:6px;"><div style="flex:1;height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;"><div style="width:${Math.round(d.tot/maxS*100)}%;height:100%;background:#185FA5;border-radius:3px;"></div></div><span style="font-size:11px;color:#888;">${Math.round(d.tot/totalP*100)}%</span></div></td>
      <td style="font-weight:700;color:#185FA5;">${fmt(d.tot)}</td>
    </tr>`).join('')}
    <tr style="background:#f8f8f8;"><td colspan="4" style="font-weight:600;padding:6px 8px;">合計</td><td style="font-weight:700;color:#185FA5;padding:6px 8px;">${fmt(totalP)}</td></tr>
    </tbody></table>`:'<div class="empty">無資料</div>'}
  </div>
  <div class="card" style="margin-bottom:12px;">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px;">🥩 進貨品項排行（前15）</div>
    ${itemList.length?`<table><thead><tr><th>品名</th><th>筆數</th><th>數量(kg)</th><th>平均單價</th><th style="width:140px;">佔比</th><th>金額</th></tr></thead>
    <tbody>${itemList.map(([k,d])=>{
      // 計算此品名在報表區間內的加權平均單價
      const nameRows=mp.filter(r=>r.name===k);
      const avgKg=nameRows.reduce((s,r)=>s+r.amount,0)/nameRows.reduce((s,r)=>s+r.qty,0);
      // 與全部歷史比較
      const histAvg=getAvgPrice(k);
      const ps=histAvg?priceStatus(avgKg,histAvg):null;
      const pStyle=ps?(ps.up?'color:#c0392b;font-weight:700':'color:#2d7d46;font-weight:700'):'';
      const pHint=ps?` <span style="font-size:10px;">${ps.up?'▲':'▼'}${Math.abs(ps.pct).toFixed(1)}%</span>`:'';
      return `<tr>
        <td>${k}</td><td>${d.cnt}</td><td>${d.kg.toFixed(1)}</td>
        <td style="${pStyle}">${fmtD(avgKg)}${pHint}</td>
        <td><div style="display:flex;align-items:center;gap:6px;"><div style="flex:1;height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;"><div style="width:${Math.round(d.tot/maxI*100)}%;height:100%;background:#2d7d46;border-radius:3px;"></div></div><span style="font-size:11px;color:#888;">${Math.round(d.tot/totalP*100)}%</span></div></td>
        <td style="font-weight:600;">${fmt(d.tot)}</td>
      </tr>`;

  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px;">💸 開銷明細</div>
    ${expList.length?`<table><thead><tr><th>類別</th><th style="width:200px;">佔比</th><th>金額</th></tr></thead>
    <tbody>${expList.map(([c,v])=>`<tr>
      <td><span class="badge ${ECAT_CLS[c]||'ba'}">${c}</span></td>
      <td><div style="display:flex;align-items:center;gap:6px;"><div style="flex:1;height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;"><div style="width:${Math.round(v/maxE*100)}%;height:100%;background:#854F0B;border-radius:3px;"></div></div><span style="font-size:11px;color:#888;">${Math.round(v/totalE*100)}%</span></div></td>
      <td style="font-weight:600;">${fmt(v)}</td>
    </tr>`).join('')}
    <tr style="background:#f8f8f8;"><td colspan="2" style="font-weight:600;padding:6px 8px;">合計</td><td style="font-weight:700;padding:6px 8px;">${fmt(totalE)}</td></tr>
    </tbody></table>`:'<div class="empty">無資料</div>'}
  </div>`;
}

// CSV 匯出
function csvRow(a){return a.map(v=>`"${String(v==null?'':v).replace(/"/g,'""')}"`).join(',');}
function dlCSV(name,rows){
  const bom='\uFEFF';
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(bom+rows.map(r=>csvRow(r)).join('\r\n'));
  a.download=name;a.click();
}

function exportCSV(){
  const{mp,me,s,e,sup}=getReportData();
  if(!s||!e){alert('請先選擇日期範圍');return;}
  const bySup={},byItem={},byExp={};
  mp.forEach(r=>{const k=r.supplier||'(未填)';if(!bySup[k])bySup[k]={tot:0,kg:0,cnt:0};bySup[k].tot+=r.amount;bySup[k].kg+=r.qty;bySup[k].cnt++;});
  mp.forEach(r=>{if(!byItem[r.name])byItem[r.name]={tot:0,kg:0};byItem[r.name].tot+=r.amount;byItem[r.name].kg+=r.qty;});
  me.forEach(e=>{byExp[e.cat]=(byExp[e.cat]||0)+e.amt;});
  dlCSV(`${s}_${e}_報表摘要.csv`,[
    [`${s}～${e}${sup?' ／'+sup:''} 進貨管理報表`],[],
    ['【總覽】'],['進貨總額',mp.reduce((t,r)=>t+r.amount,0)],['開銷總額',me.reduce((t,r)=>t+r.amt,0)],[],
    ['【供應商彙總】'],['供應商','筆數','數量(kg)','金額'],
    ...Object.entries(bySup).sort((a,b)=>b[1].tot-a[1].tot).map(([k,d])=>[k,d.cnt,d.kg.toFixed(2),d.tot]),
    [],['【品項彙總】'],['品名','數量(kg)','金額'],
    ...Object.entries(byItem).sort((a,b)=>b[1].tot-a[1].tot).map(([k,d])=>[k,d.kg.toFixed(2),d.tot]),
    [],['【開銷類別】'],['類別','金額'],
    ...Object.entries(byExp).sort((a,b)=>b[1]-a[1]).map(([c,v])=>[c,v]),
  ]);
}

function exportDetail(){
  const{mp,me,s,e,sup}=getReportData();
  if(!s||!e){alert('請先選擇日期範圍');return;}
  dlCSV(`${s}_${e}_明細.csv`,[
    [`${s}～${e} 進貨明細`],
    ['日期','品名','供應商','單價(元/kg)','單價(元/台斤)','數量(kg)','數量(台斤)','金額','備註'],
    ...mp.sort((a,b)=>a.date.localeCompare(b.date)).map(r=>[
      r.date,r.name,r.supplier||'',r.price.toFixed(2),(r.price*0.6).toFixed(2),
      r.qty.toFixed(2),(r.qty/0.6).toFixed(2),r.amount.toFixed(0),r.note||'']),
    [],
    [`${s}～${e} 開銷明細`],
    ['日期','廠商','類別','說明','付款','金額','備註'],
    ...me.sort((a,b)=>a.date.localeCompare(b.date)).map(e=>[e.date,e.supplier||'',e.cat,e.desc,e.payment==='transfer'?'匯款':'現金',e.amt.toFixed(0),e.note||'']),

}

function openSupForm(type,existingId=null){
  document.getElementById('sup-form').style.display='block';
  document.getElementById('sup-type').value=type;
  document.getElementById('sup-edit-id').value=existingId||'';
  document.getElementById('sup-form-title').textContent=existingId?'編輯廠商':'新增'+(type==='purchase'?'進貨':'開銷')+'廠商';
  document.getElementById('sup-form-title').style.color=type==='purchase'?'#185FA5':'#2d7d46';
  if(existingId){
    const s=suppliers[type].find(x=>x.id===existingId);
    if(s){
      document.getElementById('sf-name').value=s.name;
      document.getElementById('sf-contact').value=s.contact||'';
      document.getElementById('sf-phone').value=s.phone||'';
      document.getElementById('sf-tag').value=s.tag||'';
      document.getElementById('sf-bank').value=s.bank||'';
      document.getElementById('sf-acct').value=s.account||'';
      document.getElementById('sf-acname').value=s.acname||'';
      document.getElementById('sf-note').value=s.note||'';
    }
  }else{
    ['sf-name','sf-contact','sf-phone','sf-tag','sf-bank','sf-acct','sf-acname','sf-note'].forEach(id=>document.getElementById(id).value='');
  }
}
function closeSupForm(){
  document.getElementById('sup-form').style.display='none';
  document.getElementById('sup-edit-id').value='';
}
function saveSup(){
  const type=document.getElementById('sup-type').value;
  const editId=document.getElementById('sup-edit-id').value;
  const name=document.getElementById('sf-name').value.trim();
  if(!name){msgShow('sf-msg','請填寫廠商名稱',false);return;}
  const data={
    name,
    contact:document.getElementById('sf-contact').value.trim(),
    phone:document.getElementById('sf-phone').value.trim(),
    tag:document.getElementById('sf-tag').value.trim(),
    bank:document.getElementById('sf-bank').value.trim(),
    account:document.getElementById('sf-acct').value.trim(),
    acname:document.getElementById('sf-acname').value.trim(),
    note:document.getElementById('sf-note').value.trim(),
  };
  if(editId){
    const s=suppliers[type].find(x=>x.id===editId);
    if(s)Object.assign(s,data);
  }else{
    if([...suppliers.purchase,...suppliers.expense].find(s=>s.name===name)){
      msgShow('sf-msg','廠商名稱已存在',false);return;
    }
    suppliers[type].push({id:'s'+Date.now(),...data});
  }
  saveLocal();closeSupForm();renderSups();
  msgShow('sf-msg',`已儲存：${name}`);
}
function delSup(type,id){
  if(!confirm('確定刪除此廠商？'))return;
  suppliers[type]=suppliers[type].filter(s=>s.id!==id);
  saveLocal();renderSups();
}
function renderSups(){
  ['purchase','expense'].forEach(type=>{
    const el=document.getElementById(`sup-${type==='purchase'?'p':'e'}-tbl`);
    const list=suppliers[type];
    if(!list.length){el.innerHTML='<div class="empty">尚無廠商，請點上方按鈕新增</div>';return;}
    el.innerHTML=`<div style="overflow-x:auto;"><table style="min-width:800px;"><thead><tr>
      <th>廠商名稱</th><th>分類</th><th>聯絡人</th><th>電話</th><th>銀行</th><th>帳號</th><th>戶名</th><th>備註</th><th>操作</th>
    </tr></thead><tbody>${list.map(s=>`<tr>
      <td style="font-weight:600;">${s.name}</td>
      <td>${s.tag?`<span class="badge bb">${s.tag}</span>`:'-'}</td>
      <td>${s.contact||'-'}</td><td>${s.phone||'-'}</td>
      <td style="font-size:11px;">${s.bank||'-'}</td>
      <td style="font-size:11px;font-weight:600;color:#185FA5;">${s.account||'-'}</td>
      <td style="font-size:11px;">${s.acname||'-'}</td>
      <td style="font-size:11px;color:#888;">${s.note||''}</td>
      <td style="white-space:nowrap;">
        <button class="btn-s" onclick="openSupForm('${type}','${s.id}')" style="margin-right:3px;">編輯</button>
        <button class="btn-s btn-del" onclick="delSup('${type}','${s.id}')">刪除</button>
      </td>
    </tr>`).join('')}</tbody></table></div>`;
  });
}

function addProduct(){
  const name=document.getElementById('np-name').value.trim();
  const cat=document.getElementById('np-cat').value;
  const sub=document.getElementById('np-sub').value.trim()||'其他';
  const unit=document.getElementById('np-unit').value.trim()||'公斤';
  if(!name){msgShow('np-msg','請填寫商品名稱',false);return;}
  if(PRODS.find(p=>p.n===name)){msgShow('np-msg','已存在',false);return;}
  PRODS.push({c:cat,s:sub||'其他',n:name,u:unit||'公斤',custom:true});
  // 儲存自訂商品到localStorage
  try{const cp=JSON.parse(localStorage.getItem('custom_prods')||'[]');cp.push({c:cat,s:sub||'其他',n:name,u:unit||'公斤'});localStorage.setItem('custom_prods',JSON.stringify(cp));}catch(e){}
  ['np-name','np-sub','np-unit'].forEach(id=>document.getElementById(id).value='');
  renderProducts();
  msgShow('np-msg',`已新增：${name}`);
}
let editProdName=null; // 正在編輯的商品原始名稱

function startEditProd(name){
  editProdName=name;
  renderProducts();
}
function cancelEditProd(){
  editProdName=null;
  renderProducts();
}
function saveEditProd(origName){
  const p=PRODS.find(x=>x.n===origName);
  if(!p)return;
  const newName=document.getElementById('ep-pn').value.trim();
  const newCat=document.getElementById('ep-pc').value;
  const newSub=document.getElementById('ep-ps').value.trim();
  const newUnit=document.getElementById('ep-pu').value.trim();
  if(!newName){alert('商品名稱不能空白');return;}
  if(newName!==origName&&PRODS.find(x=>x.n===newName)){alert('商品名稱已存在');return;}
  p.n=newName; p.c=newCat; p.s=newSub||p.s; p.u=newUnit||p.u;
  // 更新 localStorage
  try{
    const cp=JSON.parse(localStorage.getItem('custom_prods')||'[]');
    const ci=cp.findIndex(x=>x.n===origName);
    if(ci>=0)cp[ci]={c:p.c,s:p.s,n:p.n,u:p.u};
    localStorage.setItem('custom_prods',JSON.stringify(cp));
  }catch(e){}
  editProdName=null;
  renderProducts();
  msgShow('np-msg',`已更新：${newName}`);
}
function delProd(name){
  if(!confirm(`確定刪除「${name}」？`))return;
  const idx=PRODS.findIndex(p=>p.n===name);
  if(idx>=0)PRODS.splice(idx,1);
  try{
    const cp=JSON.parse(localStorage.getItem('custom_prods')||'[]');
    localStorage.setItem('custom_prods',JSON.stringify(cp.filter(x=>x.n!==name)));
  }catch(e){}
  renderProducts();
}

function renderProducts(){
  const kw=document.getElementById('p-kw').value;
  const cat=document.getElementById('p-cat').value;
  const f=PRODS.filter(p=>(!kw||p.n.toLowerCase().includes(kw.toLowerCase()))&&(!cat||p.c===cat));
  const el=document.getElementById('p-tbl');
  if(!f.length){el.innerHTML='<div class="empty">無符合商品</div>';return;}
  const grouped={};
  f.forEach(p=>{if(!grouped[p.s])grouped[p.s]=[];grouped[p.s].push(p);});
  el.innerHTML=Object.entries(grouped).map(([sub,items])=>`
    <div class="card" style="margin-bottom:8px;">
      <div style="font-size:11px;color:#888;margin-bottom:8px;font-weight:600;">${items[0].c} › ${sub}</div>
      <table style="min-width:0;"><thead><tr>
        <th>商品名稱</th><th>大類</th><th>小類</th><th>單位</th><th style="width:90px;"></th>
      </tr></thead><tbody>
      ${items.map(p=>{
        if(editProdName===p.n){
          return `<tr style="background:#f0f6ff;">
            <td><input id="ep-pn" value="${esc(p.n)}" style="width:140px;font-size:12px;"/></td>
            <td><select id="ep-pc" style="width:90px;font-size:12px;">
              <option${p.c==='豬肉類'?' selected':''}>豬肉類</option>
              <option${p.c==='雞肉類'?' selected':''}>雞肉類</option>
              <option${p.c==='其他'?' selected':''}>其他</option>
            </select></td>
            <td><input id="ep-ps" value="${esc(p.s)}" style="width:100px;font-size:12px;"/></td>
            <td><input id="ep-pu" value="${esc(p.u||'')}" style="width:60px;font-size:12px;"/></td>
            <td style="white-space:nowrap;">
              <button class="btn-s" style="background:#185FA5;color:#fff;border:none;margin-right:2px;" onclick="saveEditProd('${esc(p.n)}')">儲存</button>
              <button class="btn-s" onclick="cancelEditProd()">取消</button>
            </td>
          </tr>`;
        }
        return `<tr>
          <td style="font-weight:500;">${p.n}${p.custom?' <span style="color:#aaa;font-size:10px;">✦</span>':''}</td>
          <td style="font-size:12px;color:#888;">${p.c}</td>
          <td style="font-size:12px;color:#888;">${p.s}</td>
          <td style="font-size:12px;color:#888;">${p.u||'-'}</td>
          <td style="white-space:nowrap;">
            <button class="btn-s" onclick="startEditProd('${esc(p.n)}')" style="margin-right:2px;">編輯</button>
            ${p.custom?`<button class="btn-s btn-del" onclick="delProd('${esc(p.n)}')">刪除</button>`:''}
          </td>
        </tr>`;
      }).join('')}
      </tbody></table>
    </div>`).join('');
}

// ══════════════════════════════════════
// 平均成本
// ══════════════════════════════════════
function clearCost(){
  document.getElementById('c-search').value='';
  document.getElementById('c-start').value='';
  document.getElementById('c-end').value='';
  document.getElementById('dd-cost').classList.remove('open');
  document.getElementById('cost-out').innerHTML='<div class="empty">輸入商品名稱搜尋，可搭配日期區間篩選</div>';
}
function setThisMonthCost(){
  const now=new Date(),y=now.getFullYear(),m=String(now.getMonth()+1).padStart(2,'0');
  document.getElementById('c-start').value=`${y}-${m}-01`;
  document.getElementById('c-end').value=new Date(y,now.getMonth()+1,0).toISOString().slice(0,10);
  const q=document.getElementById('c-search').value;
  if(q)showCost(q);
}

function showCost(prod){
  document.getElementById('c-search').value=prod;
  document.getElementById('dd-cost').classList.remove('open');
  const cs=document.getElementById('c-start').value;
  const ce=document.getElementById('c-end').value;
  // 全部進貨中有連結此商品的
  const allRows=purchases.filter(p=>(p.linked||[]).includes(prod));
  // 區間內的
  const rows=allRows.filter(p=>(!cs||p.date>=cs)&&(!ce||p.date<=ce));
  const hasFilter=cs||ce;
  const display=hasFilter?rows:allRows;

  if(!display.length){
    document.getElementById('cost-out').innerHTML=
      `<div class="empty">${hasFilter?`此區間（${cs||'不限'}～${ce||'不限'}）無「${prod}」的進貨記錄`:'此商品尚無進貨記錄'}</div>`;
    return;
  }
  const totalAmt=display.reduce((s,r)=>s+r.amount,0);
  const totalQty=display.reduce((s,r)=>s+r.qty,0);
  const allAmt=allRows.reduce((s,r)=>s+r.amount,0);
  const allQty=allRows.reduce((s,r)=>s+r.qty,0);
  const perKg=totalAmt/totalQty;
  const perTJ=perKg*0.6;
  const rangeLabel=hasFilter?`${cs||'不限'} ～ ${ce||'不限'}`:'全部時間';

  document.getElementById('cost-out').innerHTML=`
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
      <div style="font-size:16px;font-weight:600;">${prod}</div>
      <div style="font-size:12px;color:#888;">查詢區間：${rangeLabel}</div>
    </div>
    <div class="g2" style="margin-bottom:12px;">
      <div class="mcard" style="border-left:3px solid #185FA5;">
        <div class="mcard-lbl">加權平均成本（每公斤）</div>
        <div class="mcard-val blue">${fmtD(perKg)} / 公斤</div>
        <div style="font-size:11px;color:#aaa;margin-top:2px;">進貨原始單位</div>
      </div>
      <div class="mcard" style="border-left:3px solid #2d7d46;">
        <div class="mcard-lbl">換算（每台斤）</div>
        <div class="mcard-val green">${fmtD(perTJ)} / 台斤</div>
        <div style="font-size:11px;color:#aaa;margin-top:2px;">1 台斤 = 0.6 公斤</div>
      </div>
    </div>
    <div style="font-size:12px;color:#555;margin-bottom:${hasFilter?'6':'10'}px;">
      區間內 <strong>${display.length}</strong> 筆 ／ <strong>${totalQty.toFixed(2)} 公斤</strong> = <strong>${(totalQty/0.6).toFixed(2)} 台斤</strong> ／ 合計 <strong style="color:#185FA5;">${fmt(totalAmt)}</strong>
    </div>
    ${hasFilter?`<div style="font-size:12px;color:#aaa;margin-bottom:10px;">
      （全部時間共 ${allRows.length} 筆，全期平均 ${fmtD(allAmt/allQty)} /公斤 = ${fmtD(allAmt/allQty*0.6)} /台斤）
    </div>`:''}
    <div class="tbl-wrap">
    <table><thead><tr>
      <th>日期</th><th>進貨品名</th><th>供應商</th><th>數量(kg)</th><th>單價(元/kg)</th><th>換算(元/台斤)</th><th>金額</th>
    </tr></thead>
    <tbody>${display.sort((a,b)=>b.date.localeCompare(a.date)).map(r=>`<tr>
      <td>${r.date}</td><td>${r.name}</td><td>${r.supplier||'-'}</td>
      <td>${r.qty.toFixed(2)}</td>
      <td>${fmtD(r.price)}</td><td>${fmtD(r.price*0.6)}</td>
      <td>${fmt(r.amount)}</td>
    </tr>`).join('')}</tbody></table>
    </div>
  </div>`;
}
